# Role definitions for delegate_to_agent()
#
# Each role maps to a CLI scaffold + model + MCP tool ports.
# The gateway resolves these at dispatch time.
#
# Port aliases: web, knowledge_base, gitea, sandbox
# Model aliases: devstral, qwen-coder, qwen3-next (resolved via .env GGUF filenames)
# Agent CLIs: vibe, goose, goose-reviewer, qwen, qwen-cloud, kimi

roles:
  researcher:
    description: "Search the web, fetch documents, and populate the knowledge base"
    agent: vibe
    model: devstral
    mcp_ports: [web, knowledge_base]
    system_prompt: >
      You are a research agent. Search the web, read documents, and save
      valuable findings to the knowledge base. Focus on accuracy and
      cite your sources.

  reviewer:
    description: "Review code and repos, give architectural feedback"
    agent: vibe
    model: devstral
    mcp_ports: [web, knowledge_base, gitea]
    system_prompt: >
      You are a code reviewer. Examine code carefully, check for bugs,
      style issues, and potential improvements. Be constructive and specific.

  coder:
    description: "Write code, modify files, commit changes to a project"
    agent: vibe
    model: devstral
    mcp_ports: [web, gitea]
    system_prompt: >
      You are a coding agent. Write clean, well-structured code.
      Commit your changes with clear messages.
