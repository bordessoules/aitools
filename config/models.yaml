# models.yaml — LLM endpoint & model configuration
#
# Three sections:
#   endpoints  — your LLM servers (local, remote, cloud)
#   models     — named model configs, each pointing to an endpoint
#   defaults   — which model to use for agent vs vision tasks
#
# Model names are what your endpoint understands (e.g. llamaswap model IDs).
# If "name" is omitted, the YAML key is used as the model name.

endpoints:
  local:                                    # llamaswap on this PC
    url: http://host.docker.internal:8085/v1
    key: not-needed
  bluefin:                                  # 3090 on Tailscale
    url: http://100.64.10.17:8080/v1
    key: not-needed
  # openrouter:                             # cloud provider (uncomment to enable)
  #   url: https://openrouter.ai/api/v1
  #   key: sk-or-v1-xxxxx

models:
  devstral:                                 # 24B coder, fast, works on RPi
    endpoint: local
  qwen-coder:                               # 30B A3B MoE coder
    endpoint: local
  qwen-vl:                                  # 4B vision model
    endpoint: bluefin
    name: Qwen3-VL-4B-Instruct-Q8_0.gguf   # override model name sent to endpoint

defaults:
  agent: devstral        # used by delegate_agent / run_agent
  vision: qwen-vl        # used by doc parsing, web extraction, picture descriptions
